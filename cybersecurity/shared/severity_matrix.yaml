# Severity Matrix
# Security event severity matrix

severity_matrix:
  description: "Security event severity classification"
  version: "1.0.0"

severity_levels:
  critical:
    score: 9.0-10.0
    color: "Red"
    response_time: "Immediate"
    description: "System unavailable, data breach, or critical functionality compromised"
    examples:
      - "Active data exfiltration"
      - "Complete system compromise"
      - "Ransomware deployment"
  
  high:
    score: 7.0-8.9
    color: "Orange"
    response_time: "1 hour"
    description: "Significant security impact with limited scope"
    examples:
      - "Privilege escalation attempt"
      - "Unauthorized access to sensitive systems"
      - "Malware detection in production"
  
  medium:
    score: 4.0-6.9
    color: "Yellow"
    response_time: "4 hours"
    description: "Moderate security impact"
    examples:
      - "Suspicious login attempt"
      - "Policy violation"
      - "Configuration drift"
  
  low:
    score: 0.1-3.9
    color: "Green"
    response_time: "24 hours"
    description: "Minor security issue"
    examples:
      - "Informational alerts"
      - "Vulnerability in non-critical component"
      - "Security awareness event"

scoring_factors:
  - confidentiality_impact
  - integrity_impact
  - availability_impact
  - scope_of_impact
  - exploitability
