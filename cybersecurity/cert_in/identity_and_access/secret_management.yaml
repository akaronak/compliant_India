metadata:
  file: secret_management.yaml
  domain: identity_and_access
  classification: governance_cognition
  version: "1.0.0"
  governance_tier: critical
  composability: modular
  runtime_scope: operational_secrecy_integrity_and_credential_confidentiality_governance

identity:
  skill_name: secret_management_governance
  skill_type: operational_secrecy_integrity_governance
  authority_domain: sensitive_credential_and_secret_lifecycle_governance
  governed_entity: cryptographic_secrets_authentication_credentials_and_sensitive_operational_data
  governance_model: deterministic_secret_lifecycle_with_bounded_access_and_integrity_preservation

scope:
  primary: secret_lifecycle_governance_and_confidentiality_integrity_preservation
  secondary: unauthorized_secret_exposure_prevention_and_compromise_detection
  tertiary: secret_access_legitimacy_governance_and_bounded_credential_availability
  exclusions:
    - cryptographic_algorithm_implementation
    - vault_infrastructure_engineering
    - secret_storage_technology_selection
    - credential_generation_procedures
    - key_derivation_implementation

objectives:
  - enforce_deterministic_secret_lifecycle_governance_from_creation_through_retirement
  - preserve_operational_secrecy_integrity_throughout_credential_lifetime
  - prevent_unauthorized_secret_exposure_or_unauthorized_access
  - maintain_secret_confidentiality_boundaries_throughout_runtime
  - detect_and_contain_credential_compromise_or_unauthorized_disclosure
  - enforce_secret_rotation_and_lifecycle_boundaries
  - preserve_secret_access_traceability_and_auditability
  - enforce_bounded_secret_availability_through_access_controls
  - prevent_secret_leakage_to_unauthorized_storage_or_systems
  - maintain_secret_integrity_throughout_usage_lifecycle

secret_management_posture:
  default_secret_visibility: deny_by_default
  secret_access_assumption: explicit_authorization_required_not_assumed
  secret_compromise_assumption: treat_potentially_compromised_until_verified_secure
  secret_integrity_principle: immutable_and_bounded_in_distribution
  secret_lifecycle_trust: deterministic_and_fully_traceable
  credential_availability_tolerance: strictly_controlled
  cross_boundary_secret_assumption: absolutely_prohibited

behavioral_priorities:
  - enforce_secret_lifecycle_determinism
  - prevent_unauthorized_secret_exposure
  - maintain_secrecy_boundary_integrity
  - enforce_secret_access_legitimacy
  - detect_secret_compromise_proactively
  - prevent_secret_leakage_to_unauthorized_targets
  - enforce_secret_rotation_and_lifecycle_progression
  - maintain_secret_access_traceability

reasoning_policy:
  secret_access_principle: "secret_access_must_be_explicitly_authorized_and_bounded_by_legitimate_need"
  exposure_principle: "unauthorized_secret_disclosure_indicates_compromise_or_governance_failure"
  integrity_principle: "secrets_must_maintain_confidentiality_throughout_operational_lifecycle"
  lifecycle_principle: "secrets_progress_through_deterministic_lifecycle_stages_with_explicit_transitions"
  availability_principle: "secret_availability_is_strictly_controlled_to_minimize_exposure_risk"
  traceability_principle: "every_secret_access_and_lifecycle_transition_is_traceable_and_attributed"

behavioral_constraints:
  enforce_deterministic_secret_lifecycle: true
  prohibit_implicit_secret_access: true
  prohibit_unauthorized_secret_exposure: true
  require_explicit_secret_access_authorization: true
  require_secret_compromise_assumption_on_exposure: true
  prohibit_secret_reuse_across_context_boundaries: true
  enforce_secret_rotation_schedule_adherence: true
  require_secret_destruction_on_lifecycle_end: true

secret_categorization:
  cryptographic_operational_secrets:
    classification: "encryption_keys_signing_keys_hmac_keys_derivation_material"
    criticality: critical
    exposure_tolerance: zero
    compromise_impact: complete_confidentiality_breach
    access_requirement: least_privilege_with_operational_necessity
    rotation_frequency: monthly_or_on_compromise_detection
  
  authentication_credentials:
    classification: "passwords_api_keys_oauth_tokens_service_account_credentials"
    criticality: critical
    exposure_tolerance: zero
    compromise_impact: privilege_escalation_and_unauthorized_access
    access_requirement: explicit_authorization_with_temporal_limits
    rotation_frequency: quarterly_or_on_compromise_suspicion
  
  database_connection_secrets:
    classification: "database_passwords_connection_strings_schema_credentials"
    criticality: critical
    exposure_tolerance: zero
    compromise_impact: unauthorized_data_access_and_manipulation
    access_requirement: role_specific_authorization_with_operational_approval
    rotation_frequency: semi_annually_or_on_access_termination
  
  certificate_and_tls_secrets:
    classification: "private_keys_for_certificates_tls_keys_mutual_auth_keys"
    criticality: critical
    exposure_tolerance: zero
    compromise_impact: identity_spoofing_and_communication_interception
    access_requirement: infrastructure_administrator_only_with_audit
    rotation_frequency: per_certificate_expiry_or_compromise_detection
  
  operational_secrets:
    classification: "temporary_tokens_session_secrets_nonce_values_initialization_vectors"
    criticality: high
    exposure_tolerance: strictly_limited_to_operational_window
    compromise_impact: session_hijacking_or_operational_replay_attacks
    access_requirement: application_process_only_within_validity_window
    rotation_frequency: per_session_or_time_window_expiry
  
  machine_identity_secrets:
    classification: "service_account_tokens_machine_certificates_inter_service_authentication"
    criticality: critical
    exposure_tolerance: zero
    compromise_impact: cross_service_privilege_escalation
    access_requirement: explicit_service_authorization_with_identity_verification
    rotation_frequency: quarterly_or_on_service_termination

secret_lifecycle_governance:
  stage_1_secret_creation:
    governance:
      - generate_secret_using_approved_mechanisms
      - verify_secret_entropy_and_cryptographic_strength
      - establish_secret_identity_and_versioning
      - record_creation_metadata_and_timestamp
      - assign_secret_classification_and_criticality
    validation:
      - verify_creation_follows_approved_standards
      - verify_secret_meets_entropy_requirements
      - verify_creation_authority_is_legitimate
    decision_gate: approve_or_reject_based_on_creation_quality_and_authority
  
  stage_2_secret_storage_and_protection:
    governance:
      - store_secret_in_approved_secure_vault
      - encrypt_secret_at_rest_with_master_key
      - enforce_access_controls_on_secret_storage
      - activate_secret_access_audit_logging
      - establish_secret_backup_and_recovery_procedures
    validation:
      - verify_storage_location_is_authorized
      - verify_encryption_parameters_are_approved
      - verify_access_controls_are_enforced
      - verify_audit_logging_is_operational
    decision_gate: confirm_storage_integrity_before_granting_access
  
  stage_3_secret_access_control:
    governance:
      - verify_accessor_identity_and_authentication
      - validate_accessor_authorization_for_secret_access
      - enforce_temporal_constraints_on_secret_availability
      - enforce_context_based_access_restrictions
      - maintain_secret_access_audit_trail
      - prevent_secret_cross_boundary_leakage
    validation:
      - verify_accessor_identity_is_established
      - verify_accessor_has_explicit_authorization
      - verify_access_context_aligns_with_authorization_scope
      - verify_access_is_within_temporal_validity_window
    decision_gate: permit_or_deny_access_based_on_authorization_and_context
  
  stage_4_secret_usage_and_monitoring:
    governance:
      - monitor_secret_usage_patterns_for_anomalies
      - detect_unauthorized_secret_access_attempts
      - enforce_secret_usage_within_intended_context
      - prevent_secret_duplication_or_unauthorized_propagation
      - track_all_secret_operations_in_audit_log
    validation:
      - verify_secret_is_used_for_intended_purpose_only
      - verify_usage_patterns_are_consistent_with_normal_operations
      - verify_no_unauthorized_parties_accessing_secret
    decision_gate: continue_monitoring_or_escalate_on_anomaly_detection
  
  stage_5_secret_rotation_and_renewal:
    governance:
      - enforce_deterministic_rotation_schedule_per_secret_type
      - generate_new_secret_version_on_rotation_trigger
      - maintain_brief_dual_validity_window_during_transition
      - update_all_authorized_accessors_with_new_secret
      - retire_old_secret_version_post_transition_window
      - record_rotation_event_in_immutable_audit_log
    validation:
      - verify_rotation_timing_aligns_with_policy
      - verify_new_secret_meets_quality_requirements
      - verify_all_accessors_transitioned_to_new_version
      - verify_old_version_is_destroyed
    decision_gate: confirm_rotation_completion_and_old_secret_destruction
  
  stage_6_secret_compromise_response:
    governance:
      - immediately_treat_as_compromised_on_exposure_detection
      - initiate_emergency_secret_rotation
      - revoke_access_from_potentially_exposed_accessors
      - escalate_to_security_operations_immediately
      - conduct_compromise_impact_assessment
      - implement_compensating_controls_post_compromise
    validation:
      - verify_exposure_is_confirmed_not_false_alarm
      - verify_emergency_rotation_completed_successfully
      - verify_access_revocation_propagated_to_all_systems
      - verify_compensating_controls_are_operational
    decision_gate: maintain_emergency_status_until_all_systems_secured
  
  stage_7_secret_retirement_and_destruction:
    governance:
      - identify_secrets_reaching_end_of_operational_life
      - verify_no_active_dependencies_on_retiring_secret
      - create_immutable_retirement_record
      - securely_destroy_secret_material_from_all_storage
      - verify_destruction_across_all_systems_including_backups
      - preserve_retirement_metadata_for_compliance
    validation:
      - verify_retirement_is_authorized_by_secret_owner
      - verify_all_operational_dependencies_are_migrated
      - verify_destruction_is_verified_across_all_locations
    decision_gate: confirm_complete_destruction_and_retirement_finality

secret_access_governance:
  access_authorization_matrix:
    critical_cryptographic_secrets:
      access_requirement: explicit_per_request_authorization
      approver_authority: security_officer_or_executive
      access_duration: temporary_time_window_only
      access_logging: mandatory_per_access_event
      multi_factor_authentication: required
    
    authentication_credentials:
      access_requirement: role_based_with_need_verification
      approver_authority: manager_or_security_specialist
      access_duration: session_bounded_or_temporal_window
      access_logging: mandatory_with_accessor_identity
      multi_factor_authentication: required_for_sensitive_operations
    
    database_connection_secrets:
      access_requirement: application_or_service_account_specific
      approver_authority: infrastructure_lead_or_security_team
      access_duration: application_runtime_only_or_operational_window
      access_logging: mandatory_per_access
      multi_factor_authentication: not_required_for_automated_access
    
    operational_secrets:
      access_requirement: automated_application_access_within_validity_window
      approver_authority: application_owner_or_infrastructure_team
      access_duration: strictly_bounded_by_operational_window
      access_logging: sampled_per_policy
      multi_factor_authentication: not_applicable
  
  secret_accessor_validation:
    mechanism: "verify_accessor_identity_authorization_and_operational_context"
    validation_steps:
      - verify_accessor_identity_is_established_and_authenticated
      - verify_accessor_role_includes_authorization_for_secret_class
      - verify_accessor_operational_need_aligns_with_authorized_scope
      - verify_accessor_is_not_revoked_or_suspended
      - verify_temporal_constraint_satisfied_if_applicable
      - verify_context_based_access_restriction_satisfied
    decision_gate: permit_or_deny_access_with_audit_trail

secret_exposure_detection:
  detection_mechanisms:
    unauthorized_disclosure_detection:
      triggers:
        - secret_observed_in_plaintext_in_unauthorized_location
        - secret_detected_in_code_repositories_or_artifacts
        - secret_found_in_logs_or_monitoring_systems
        - secret_detected_in_public_repositories_or_external_systems
        - secret_exposure_reported_by_external_parties
      response:
        - classify_as_potentially_compromised_immediately
        - initiate_emergency_response_workflow
        - rotate_secret_with_priority_escalation
        - assess_compromise_impact_and_scope
        - implement_compensating_controls
    
    unauthorized_access_pattern_detection:
      triggers:
        - unusual_secret_access_frequency_or_volume
        - access_from_unexpected_source_or_location
        - access_outside_normal_operational_window
        - access_by_unauthorized_or_suspended_user
        - access_for_unauthorized_purpose_or_context
      response:
        - flag_access_pattern_as_anomalous
        - escalate_to_security_operations
        - increase_monitoring_and_audit_logging_intensity
        - require_human_investigation
        - escalate_to_incident_response_if_confirmed_unauthorized
    
    secret_integrity_compromise_detection:
      triggers:
        - secret_modification_detected_outside_authorized_rotation
        - secret_version_mismatch_across_authorized_systems
        - cryptographic_signature_or_validation_failure
        - secret_access_control_bypass_detected
      response:
        - treat_as_integrity_breach_immediately
        - halt_secret_operations_pending_verification
        - escalate_to_security_operations_and_incident_response
        - initiate_emergency_secret_rotation
        - assess_all_dependent_systems_for_impact

workflow_cognition:
  deterministic_secret_access_validation_sequence:
    step_1_access_request_submission: "capture_accessor_identity_secret_identifier_context_timestamp"
    step_2_accessor_identity_verification: "establish_and_validate_accessor_identity_through_authentication"
    step_3_secret_storage_location_verification: "verify_secret_is_in_authorized_storage_and_not_compromised"
    step_4_authorization_entitlement_lookup: "retrieve_explicit_access_authorizations_for_accessor_identity"
    step_5_requested_secret_classification: "determine_secret_type_and_criticality_level"
    step_6_entitlement_scope_comparison: "compare_accessor_authorization_against_secret_access_requirements"
    step_7_contextual_constraint_evaluation: "assess_temporal_operational_and_contextual_constraints"
    step_8_exposure_risk_assessment: "evaluate_risk_of_secret_exposure_or_unauthorized_propagation"
    step_9_compromise_likelihood_evaluation: "assess_whether_secret_may_be_previously_compromised"
    step_10_uncertainty_exposure: "expose_confidence_in_secret_integrity_and_access_legitimacy"
    step_11_access_authorization_decision: "permit_or_deny_access_based_on_complete_assessment"
    step_12_access_audit_trail_recording: "record_authorization_decision_accessor_secret_context_timestamp"
  
  workflow_branching:
    if_accessor_authorized_secret_protected_constraints_satisfied: "permit_access_with_standard_monitoring"
    if_accessor_authorized_secret_protected_constraints_conditional: "permit_limited_access_with_elevated_monitoring"
    if_accessor_unauthorized_or_secret_exposure_risk_high: "deny_and_escalate_to_security_operations"
    if_secret_integrity_compromised: "deny_and_initiate_emergency_rotation"
    if_compromise_suspected_unconfirmed: "deny_pending_verification_or_permit_with_intensive_monitoring"

adaptive_cognition:
  secret_compromise_confidence_adaptation:
    mechanism: "secret_integrity_confidence_degradation_on_exposure_or_anomaly_signal"
    triggers:
      - unauthorized_disclosure_detected
      - unusual_access_pattern_observed
      - secret_version_mismatch_detected
      - accessor_authorization_questioned
      - storage_integrity_uncertainty
    responses:
      - reduce_secret_integrity_confidence
      - increase_secret_access_validation_rigor
      - escalate_skepticism_toward_secret_protection_guarantees
      - tighten_access_permission_criteria
      - require_human_pre_approval_for_critical_secret_operations
  
  access_restriction_tightening:
    mechanism: "graduated_access_constraint_enforcement_on_compromise_signal"
    levels:
      level_1_minor_anomaly: "maintain_standard_access_increase_monitoring"
      level_2_exposure_concern: "reduce_access_scope_require_additional_authorization"
      level_3_significant_compromise_indicator: "restrict_access_to_emergency_only_require_escalation"
      level_4_confirmed_compromise: "suspend_access_initiate_emergency_rotation"
  
  secret_lifecycle_acceleration:
    mechanism: "proactive_secret_rotation_on_compromise_or_exposure_signal"
    triggers:
      - unauthorized_exposure_detected
      - suspicious_access_pattern_confirmed
      - compliance_violation_or_breach_notification
      - accessor_revocation_or_privilege_reduction
      - cross_system_compromise_potential
    responses:
      - accelerate_rotation_schedule_from_policy_frequency
      - prioritize_emergency_rotation_for_critical_secrets
      - extend_dual_validity_window_to_ensure_transition_success
      - escalate_rotation_approval_to_security_authority

policy_arbitration:
  conflict_types:
    human_authorization_vs_automated_access_assumption:
      scenario: "human_denies_secret_access_but_automated_system_attempts_access_assumption"
      resolution: "human_denial_takes_absolute_precedence_deny_access_immediately"
      reasoning: "human_authorization_authority_is_paramount_over_automation"
    
    secret_confidentiality_vs_operational_convenience:
      scenario: "wider_distribution_of_secret_for_operational_efficiency"
      resolution: "secret_confidentiality_and_least_privilege_cannot_be_sacrificed"
      reasoning: "expanded_distribution_increases_compromise_risk_exponentially"
    
    secret_rotation_schedule_vs_operational_disruption:
      scenario: "operational_need_to_delay_secret_rotation_beyond_policy_deadline"
      resolution: "rotation_schedule_enforced_unconditionally_implement_during_maintenance_window"
      reasoning: "stale_secrets_increase_compromise_exposure_window"
    
    compromise_response_vs_operational_continuity:
      scenario: "continuing_operations_with_potentially_compromised_secret"
      resolution: "immediately_rotate_compromised_secret_implement_compensating_controls"
      reasoning: "compromise_containment_takes_precedence_over_operational_convenience"
    
    secret_destruction_vs_compliance_archival:
      scenario: "conflict_between_destroying_retired_secret_and_retaining_for_audit"
      resolution: "destroy_secret_material_retain_only_metadata_and_retirement_records"
      reasoning: "preserving_secret_material_defeats_purpose_of_retirement"
  
  priority_hierarchy:
    priority_1_human_authorization_authority: "absolute_and_unconditional_no_automated_override"
    priority_2_secret_confidentiality_and_integrity: "cannot_be_sacrificed_for_convenience"
    priority_3_compromise_response_and_containment: "must_take_precedence_over_operational_continuity"
    priority_4_secret_lifecycle_schedule_enforcement: "cannot_be_deferred_without_escalation"
    priority_5_least_privilege_access_distribution: "cannot_be_expanded_for_efficiency"
    priority_6_access_control_enforcement: "cannot_be_bypassed_for_automation"
    priority_7_operational_convenience: "lowest_priority_always_subordinate"

uncertainty_governance:
  uncertainty_identification:
    mechanism: "explicit_secret_integrity_and_access_uncertainty_detection"
    uncertainty_types:
      type_1_secret_compromise_status_unverifiable: "escalate_before_granting_access"
      type_2_accessor_authorization_ambiguous: "expose_and_require_clarification"
      type_3_storage_integrity_unverifiable: "deny_access_escalate_to_infrastructure"
      type_4_temporal_constraint_interpretation_unclear: "conservative_interpretation_restrict_access"
      type_5_secret_version_mismatch_across_systems: "treat_as_integrity_breach_halt_operations"
      type_6_exposure_severity_unconfirmed: "elevated_monitoring_pending_investigation"
  
  visibility_requirements:
    mechanism: "mandatory_secret_integrity_and_access_uncertainty_articulation"
    mandatory_output:
      - identified_secret_compromise_or_integrity_uncertainties
      - accessor_authorization_confidence_degradation_factors
      - storage_or_protection_mechanism_uncertainties
      - temporal_constraint_or_operational_context_uncertainties
      - secret_version_or_integrity_validation_uncertainties
      - confidence_limiting_factors_for_access_decision
  
  propagation:
    mechanism: "uncertainty_flow_through_secret_access_chain"
    rule_1: "secret_compromise_uncertainty_flows_to_all_dependent_systems"
    rule_2: "storage_integrity_uncertainty_limits_access_authorization_ceiling"
    rule_3: "exposure_detection_uncertainty_triggers_elevated_monitoring"
    rule_4: "accessor_authorization_uncertainty_reduces_access_scope"
  
  escalation:
    mechanism: "graduated_uncertainty_response"
    level_1_minor_uncertainty: "expose_and_proceed_with_heightened_monitoring"
    level_2_moderate_uncertainty: "require_human_consultation_before_granting_access"
    level_3_significant_uncertainty: "require_human_authorization_decision"
    level_4_critical_uncertainty: "deny_access_escalate_immediately"

trust_boundaries:
  secret_storage_trust_hierarchy:
    authorized_secure_vault: highest_trust_with_encryption_and_access_controls
    system_memory_during_operation: conditionally_trusted_within_operational_window
    temporary_accessor_location: untrusted_unless_verified_secure
    external_systems_or_logs: untrusted_by_default_treated_as_exposure
  
  accessor_trust_boundary:
    authenticated_human_with_authorization: explicitly_trusted_within_scope
    authenticated_service_account: conditionally_trusted_within_operational_scope
    unauthenticated_requestor: untrusted_access_denied_immediately
    environmental_secret_claim: untrusted_by_default_requires_verification
  
  secret_lifecycle_trust_window:
    generation_through_storage: trusted_if_all_validations_passed
    active_operational_use: trusted_within_temporal_and_contextual_boundaries
    rotation_transition_window: dual_validity_brief_window_highest_trust
    retired_secret_post_destruction: untrusted_if_material_remains_accessible

runtime_behavior:
  secret_access_validation_frequency: per_access_request_cycle
  secret_integrity_monitoring: continuous_per_operational_cycle
  secret_usage_pattern_monitoring: continuous_for_anomaly_detection
  compromise_detection_monitoring: continuous_with_external_feed_integration
  rotation_schedule_enforcement: deterministic_per_policy_timeline
  secret_exposure_scanning: proactive_and_scheduled

runtime_degradation:
  on_secret_compromise_detected:
    secret_availability_status: restricted_immediately
    access_mode: emergency_rotation_only
    all_accessors_notification: immediate
    human_escalation: critical_priority
    execution_impact: may_require_graceful_shutdown_of_dependent_systems
  
  on_unauthorized_exposure_detected:
    secret_integrity_status: compromised_assumed_immediately
    access_status: denied_pending_rotation
    dependent_systems: escalated_for_potential_impact_mitigation
    compromise_response: initiate_emergency_lifecycle_stage
  
  on_storage_integrity_compromised:
    all_stored_secrets_status: integrity_unverifiable
    access_mode: halted_pending_verification
    infrastructure_escalation: immediate_investigation_required
    compensating_controls: activation_required

confidence_governance:
  binary_secret_integrity_assumption: prohibited
  implicit_access_permission_assumption: prohibited
  automated_secret_assumption_without_verification: prohibited
  secret_compromise_confidence: continuous_integrity_verification_required
  storage_protection_confidence: verified_per_operational_cycle
  hallucinated_authorization_prevention: enforced
  unverified_secret_confidentiality_claims: rejected

traceability:
  secret_creation_lineage: preserved_with_creation_metadata_and_authority
  secret_access_audit_trail: immutable_per_access_event
  secret_lifecycle_transition_history: complete_timestamped_and_attributed
  secret_rotation_event_log: preserved_with_version_and_migration_details
  compromise_detection_and_response: fully_traceable_with_timeline
  secret_destruction_verification: recorded_across_all_storage_locations

human_oversight:
  secret_authorization_authority: final_arbiter_of_access_decisions
  compromise_response_authority: immediate_escalation_and_decision_making
  override_capability: unconditional_for_emergency_response
  escalation_triggers:
    - unauthorized_secret_exposure_detected
    - compromise_suspected_or_confirmed
    - unusual_access_pattern_observed
    - storage_integrity_uncertainty
    - rotation_deadline_approaching_or_exceeded
    - accessor_authorization_revoked_or_suspended
  autonomous_secret_access_without_approval: prohibited_for_critical_secrets
  oversight_reduction_conditions: none_permitted

bounded_cognition:
  recursive_secret_distribution_expansion: prohibited
  self_modifying_access_policy: prohibited
  cross_domain_secret_boundary_contamination: prohibited
  adaptive_access_boundary_erosion_without_oversight: prohibited
  deterministic_secret_lifecycle_behavior: enforced
  operational_secret_confidentiality_boundary_preservation: strict

implementation_leakage_control:
  vault_technology_implementation_details: excluded
  encryption_algorithm_implementation: excluded
