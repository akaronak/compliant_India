metadata:
  file: credential_exposure_detection.yaml
  domain: identity_and_access
  classification: governance_cognition
  version: "1.0.0"
  governance_tier: critical
  composability: modular
  runtime_scope: credential_compromise_detection_and_exposure_response_governance

identity:
  skill_name: credential_exposure_detection
  skill_type: credential_compromise_detection_governance
  authority_domain: compromised_credential_identification_and_incident_response
  governed_entity: credential_exposure_events_and_compromise_response_activation
  governance_model: deterministic_compromise_detection_with_immediate_response_activation

scope:
  primary: credential_compromise_detection_and_exposure_response_governance
  secondary: credential_exposure_risk_assessment_and_containment_activation
  tertiary: incident_coordination_and_remediation_workflow_enforcement
  exclusions:
    - vulnerability_scanning_tool_implementation
    - dark_web_monitoring_infrastructure
    - breach_database_infrastructure
    - detection_system_deployment_procedures

objectives:
  - identify_credential_exposure_through_multi_vector_detection
  - assess_credential_exposure_risk_and_impact_scope
  - activate_immediate_response_procedures_on_detection
  - prevent_credential_reuse_exploitation_post_disclosure
  - detect_unauthorized_credential_usage_post_exposure
  - preserve_forensic_evidence_of_exposure_incident
  - coordinate_incident_response_across_affected_systems
  - maintain_exposure_detection_and_response_traceability
  - enforce_remediation_workflows_and_verification

detection_posture:
  exposure_detection_stance: continuous_proactive_monitoring
  detection_assumption: exposures_must_be_assumed_likely
  response_timing: immediate_upon_detection
  exposure_severity_assumption: critical_unless_definitively_ruled_out
  remediation_urgency: maximum_priority_if_confirmed

behavioral_priorities:
  - identify_credentials_exposed_in_multiple_vectors
  - assess_operational_impact_of_exposure
  - activate_immediate_containment_procedures
  - prevent_unauthorized_usage_post_disclosure
  - escalate_to_security_operations_immediately
  - preserve_forensic_evidence_comprehensively
  - coordinate_multi_system_remediation
  - maintain_exposure_incident_traceability

reasoning_policy:
  exposure_detection_principle: "credentials_must_be_assumed_compromised_if_exposure_detected"
  scope_principle: "exposure_scope_must_be_comprehensively_assessed_across_all_systems"
  urgency_principle: "credential_compromise_response_must_be_activated_immediately"
  containment_principle: "compromised_credentials_must_be_revoked_before_exploitation"
  evidence_principle: "all_exposure_evidence_must_be_preserved_for_investigation"
  auditability_principle: "exposure_detection_and_response_events_are_fully_traceable"

behavioral_constraints:
  enforce_immediate_exposure_response: true
  prohibit_credential_reuse_post_exposure: true
  require_comprehensive_exposure_scope_assessment: true
  require_immediate_credential_revocation: true
  prohibit_silent_exposure_handling: true
  require_forensic_evidence_preservation: true
  enforce_multi_vector_detection: true
  require_incident_escalation_on_confirmation: true

credential_exposure_detection_vectors:
  code_repository_exposure_detection:
    mechanism: "identification_of_credentials_committed_to_version_control"
    detection_methods:
      - automated_pattern_matching_for_credential_formats
      - entropy_analysis_for_probable_secrets
      - repository_history_scanning_for_past_commits
      - public_repository_specific_scanning
      - branch_protection_bypass_detection
    triggers:
      - credential_pattern_matched_in_repository
      - high_entropy_string_matching_secret_patterns
      - exposed_api_key_or_password_detected
      - certificate_or_private_key_found
    response:
      - immediate_repository_access_restriction
      - commit_history_sanitization_procedure_activation
      - credential_revocation_initiation
      - affected_system_compromise_assessment
    validation:
      - verify_detection_pattern_match_legitimate
      - verify_exposure_timeline_from_repository_history
      - assess_repository_access_visibility
  
  log_file_exposure_detection:
    mechanism: "identification_of_credentials_logged_in_system_or_application_logs"
    detection_methods:
      - log_pattern_scanning_for_credential_formats
      - anomalous_log_pattern_analysis
      - centralized_log_aggregation_scanning
      - failed_authentication_pattern_analysis_for_credential_disclosure
      - error_message_analysis_for_credential_leakage
    triggers:
      - credential_pattern_matched_in_log_file
      - authentication_error_message_contains_credential
      - debug_output_contains_secret_values
      - stack_trace_contains_credential_information
    response:
      - log_file_sanitization_immediate
      - log_aggregation_system_scan_activation
      - credential_revocation_initiation
      - affected_service_restart_if_necessary
    validation:
      - verify_log_entry_is_legitimate_exposure
      - verify_log_retention_exposure_window
      - assess_log_file_access_scope
  
  configuration_file_exposure_detection:
    mechanism: "identification_of_credentials_in_configuration_files"
    detection_methods:
      - configuration_file_scanning_for_credential_assignments
      - backup_and_archive_file_scanning
      - infrastructure_code_repository_scanning
      - container_image_layer_scanning
      - environment_variable_value_analysis
    triggers:
      - credential_hardcoded_in_configuration
      - api_key_or_token_in_environment_variable
      - database_password_in_config_file
      - certificate_or_key_in_configuration_data
    response:
      - configuration_file_update_and_credential_removal
      - affected_service_credential_refresh
      - credential_revocation_initiation
      - deployment_pipeline_update_requirement
    validation:
      - verify_configuration_exposure_scope
      - verify_affected_deployments_identified
      - verify_remediation_deployed_uniformly
  
  public_repository_and_disclosure_monitoring:
    mechanism: "monitoring_of_public_repositories_for_credential_disclosure"
    detection_methods:
      - continuous_github_and_public_repository_scanning
      - gist_and_snippet_repository_monitoring
      - pastebin_and_similar_service_monitoring
      - academic_paper_and_publication_repository_scanning
      - publicly_accessible_backup_detection
    triggers:
      - organization_credential_found_in_public_repository
      - api_key_or_token_detected_in_public_gist
      - credentials_found_in_disclosed_source_code
      - credentials_in_publicly_shared_documentation
    response:
      - credential_revocation_immediate
      - public_repository_takedown_request_initiation
      - exposed_credential_scope_assessment
      - affected_systems_compromise_investigation
    validation:
      - verify_discovered_credential_belongs_to_organization
      - verify_exposure_timeline_and_scope
      - verify_public_access_confirmed
  
  dark_web_and_breach_database_monitoring:
    mechanism: "monitoring_of_breach_databases_and_darknet_for_credential_sales"
    detection_methods:
      - breach_database_monitoring_for_organization_credentials
      - dark_web_marketplaces_monitoring_for_credential_sales
      - threat_intelligence_feed_analysis
      - credential_marketplace_notification_services
      - law_enforcement_and_security_vendor_partnerships
    triggers:
      - organization_credentials_found_in_breach_database
      - credentials_offered_for_sale_on_dark_web
      - threat_actor_advertisement_of_credential_access
      - breach_notification_from_third_party_provider
    response:
      - credentialsrevocation_and_rotation_immediate
      - targeted_compromise_investigation_initiation
      - affected_user_or_system_notification
      - security_incident_escalation_to_executive_level
    validation:
      - verify_credential_attribution_to_organization
      - verify_source_reliability_and_threat_intelligence_confidence
      - verify_credential_validity_and_usage_recency
  
  insider_threat_and_unusual_access_pattern_detection:
    mechanism: "detection_of_credential_usage_anomalies_suggesting_compromise"
    detection_methods:
      - unusual_access_pattern_analysis
      - credential_usage_geographic_or_temporal_anomaly
      - privilege_elevation_from_unexpected_source
      - credential_usage_outside_defined_scope
      - concurrent_impossible_geographic_usage
    triggers:
      - credential_used_from_geographically_impossible_location
      - credential_usage_during_off_hours_unusual_for_identity
      - elevated_privilege_operations_from_unusual_context
      - credential_accessing_previously_untouched_resources
    response:
      - credential_suspension_pending_investigation
      - identity_authentication_challenge_requirement
      - access_pattern_forensic_analysis
      - potential_compromise_investigation_activation
    validation:
      - verify_anomaly_is_legitimate_behavior_change_or_compromise_signal
      - assess_anomaly_severity_and_compromise_probability
      - determine_containment_vs_monitoring_appropriate_response

compromise_impact_assessment:
  compromise_scope_determination:
    mechanism: "assessment_of_systems_and_resources_potentially_affected_by_compromised_credential"
    assessment_process:
      - identify_credential_type_and_privilege_level
      - trace_all_systems_where_credential_has_valid_access
      - assess_resource_sensitivity_of_affected_systems
      - identify_data_exposure_potential_if_credential_exploited
      - estimate_operational_impact_if_exploitation_occurs
    scope_classification:
      - critical_scope: credential_provides_access_to_sensitive_data_or_critical_systems
      - high_scope: credential_provides_access_to_important_operational_systems
      - medium_scope: credential_provides_access_to_standard_operational_resources
      - low_scope: credential_provides_limited_access_to_non_sensitive_resources
  
  exploitation_probability_assessment:
    mechanism: "estimation_of_likelihood_credential_will_be_exploited_if_not_revoked"
    assessment_factors:
      - credential_exposure_vector_accessibility: public_vs_private
      - threat_actor_knowledge_of_organization: general_interest_vs_targeted
      - credential_economic_value_on_market: saleable_vs_limited_value
      - time_since_exposure_detected: recently_exposed_vs_stale
      - defender_response_timing_advantage: immediate_vs_delayed
    probability_classification:
      - critical_probability: exploitation_almost_certain_if_not_contained
      - high_probability: exploitation_likely_if_not_revoked
      - moderate_probability: exploitation_possible_but_not_certain
      - low_probability: exploitation_unlikely_but_possible
  
  remediation_urgency_determination:
    mechanism: "determination_of_incident_response_priority_and_resource_allocation"
    urgency_factors:
      - impact_scope_severity
      - exploitation_probability_assessment
      - credential_type_and_privilege_level
      - organizational_risk_posture_and_threat_landscape
    urgency_classification:
      - critical_urgency: immediate_all_hands_response_activation
      - high_urgency: expedited_response_within_hours
      - medium_urgency: standard_incident_response_within_24_hours
      - low_urgency: routine_investigation_and_rotation_within_week

credential_remediation_workflow:
  immediate_containment_phase:
    mechanism: "rapid_response_to_limit_exploitation_window"
    actions:
      - revoke_exposed_credential_immediately
      - suspend_associated_identity_or_service_account
      - block_credential_usage_at_all_authentication_layers
      - notify_all_dependent_services_of_credential_invalidation
      - preserve_current_system_state_for_forensics
    validation:
      - verify_credential_revocation_enforced_system_wide
      - verify_no_residual_access_using_exposed_credential
      - verify_dependent_services_updated
    decision_gate: confirm_containment_or_escalate_if_incomplete
  
  compromise_investigation_phase:
    mechanism: "forensic_analysis_to_determine_exploitation_extent"
    investigative_activities:
      - trace_credential_usage_history_post_exposure
      - identify_unauthorized_activities_using_credential
      - determine_data_accessed_by_attacker_if_exploited
      - assess_lateral_movement_or_privilege_escalation_occurred
      - preserve_forensic_evidence_for_incident_report
    investigation_outputs:
      - exploitation_confirmation_or_ruling_out
      - scope_of_unauthorized_access_if_exploited
      - attacker_identity_or_pattern_if_determinable
      - recommendations_for_system_hardening
    validation:
      - verify_investigation_methodology_sound
      - verify_evidence_chain_of_custody_preserved
      - verify_findings_documented_comprehensively
  
  remediation_and_restoration_phase:
    mechanism: "restoration_of_secure_state_post_compromise"
    remediation_activities:
      - issue_replacement_credential_with_enhanced_security
      - force_password_or_token_rotation_for_linked_identities
      - apply_security_fixes_to_prevent_recurrence
      - update_monitoring_to_detect_similar_exposures
      - implement_additional_controls_if_needed
    restoration_validation:
      - verify_replacement_credential_functional_and_secure
      - verify_related_credentials_rotated_if_necessary
      - verify_monitoring_enhancements_deployed
      - verify_affected_systems_restored_to_operational_status
    decision_gate: restore_credential_access_or_maintain_suspension_pending_verification
  
  post_incident_recovery_phase:
    mechanism: "organizational_learning_and_prevention_of_similar_incidents"
    recovery_activities:
      - conduct_root_cause_analysis_of_exposure
      - identify_procedural_or_technical_control_improvements
      - implement_enhanced_detection_capabilities
      - train_developers_and_operators_on_lessons_learned
      - update_security_policies_based_on_incident_findings
    recovery_validation:
      - verify_root_cause_address_through_control_improvements
      - verify_enhanced_detection_capabilities_operational
      - verify_personnel_training_completed
      - verify_policy_updates_communicated_and_understood
    decision_gate: document_incident_closed_or_maintain_enhanced_monitoring

workflow_cognition:
  deterministic_credential_exposure_detection_and_response_sequence:
    step_1_exposure_signal_reception: "capture_credential_exposure_detection_signal_and_metadata"
    step_2_signal_legitimacy_assessment: "verify_exposure_signal_is_credible_and_actionable"
    step_3_credential_identification: "identify_specific_credential_exposed_and_type"
    step_4_affected_scope_determination: "trace_all_systems_where_credential_valid"
    step_5_compromise_probability_assessment: "evaluate_likelihood_credential_exploited"
    step_6_impact_scope_classification: "classify_potential_impact_if_exploited"
    step_7_remediation_urgency_determination: "prioritize_response_based_on_risk"
    step_8_containment_action_execution: "activate_immediate_credential_revocation"
    step_9_investigation_activation: "initiate_forensic_analysis_of_exposure"
    step_10_exploitation_evidence_search: "search_for_unauthorized_usage_post_exposure"
    step_11_remediation_workflow_initiation: "activate_credential_rotation_and_system_hardening"
    step_12_recovery_and_learning_activation: "schedule_root_cause_analysis_and_improvements"
    step_13_uncertainty_exposure: "articulate_investigation_confidence_and_limiting_factors"
    step_14_incident_coordination_and_escalation: "coordinate_across_affected_systems_and_escalate_appropriately"
  
  workflow_branching:
    if_exposure_confirmed_credential_identified: "activate_immediate_revocation_and_investigation"
    if_exposure_unconfirmed_signal_ambiguous: "escalate_for_security_analyst_validation"
    if_exploitation_evidence_found: "escalate_critical_security_incident_response"
    if_exploitation_not_detected: "proceed_with_standard_rotation_and_monitoring_enhancement"
    if_scope_affects_multiple_critical_systems: "escalate_to_executive_security_decision_making"

risk_classification:
  credential_exploited_for_unauthorized_access: critical
  credential_exploited_for_data_exfiltration: critical
  compromised_administrative_credential: critical
  wide_scope_credential_exposure: high
  credential_exposure_in_public_venue: high
  credential_with_elevated_privilege_exposed: high
  delay_in_credential_revocation: high
  exploitation_evidence_found: critical

decision_logic:
  on_exposure_signal_credible: activate_immediate_response
  on_credential_identified_determine_scope: assess_affected_systems
  on_critical_scope_determined: revoke_immediately_escalate
  on_exploitation_evidence_found: elevate_to_critical_incident
  on_investigation_unable_to_determine_exploitation: maintain_elevated_monitoring
  on_remediation_complete_and_verified: restore_to_normal_monitoring
  on_similar_exposure_pattern_detected: enhance_detection_capabilities

adaptive_cognition:
  exposure_detection_confidence_adaptation:
    mechanism: "exposure_assessment_confidence_adjustment_based_on_investigation_evidence"
    triggers:
      - exploitation_evidence_discovered
      - attacker_attribution_becomes_clear
      - lateral_movement_or_privilege_escalation_detected
      - additional_exposures_discovered_during_investigation
      - threat_intelligence_indicates_targeted_campaign
    responses:
      - increase_remediation_urgency_escalation
      - expand_compromise_investigation_scope
      - activate_additional_detection_and_monitoring
      - enhance_security_hardening_measures
      - escalate_to_executive_and_legal_teams_if_severe

  containment_aggressiveness_escalation:
    mechanism: "graduated_response_intensity_based_on_compromise_extent"
    levels:
      level_1_routine_credential_exposure: "standard_rotation_enhanced_monitoring"
      level_2_probable_exploitation_low_impact: "accelerated_rotation_elevated_monitoring"
      level_3_confirmed_limited_exploitation: "force_system_reset_comprehensive_scanning"
      level_4_extensive_exploitation_suspected: "emergency_incident_response_maximum_containment"

policy_arbitration:
  conflict_types:
    operational_continuity_vs_rapid_credential_revocation:
      scenario: "revoking_exposed_credential_disrupts_critical_operations"
      resolution: "credential_revocation_prioritized_operations_adapted"
      reasoning: "compromised_credential_cannot_remain_active"
    
    investigation_scope_vs_organizational_disruption:
      scenario: "comprehensive_forensics_requires_system_downtime"
      resolution: "investigation_scope_scaled_based_on_impact_criticality"
      reasoning: "evidence_preservation_and_investigation_prioritized"
    
    public_disclosure_vs_remediation_timing:
      scenario: "public_knowledge_of_breach_before_complete_remediation"
      resolution: "remediation_timing_driven_by_exposure_assessment_not_disclosure_timing"
      reasoning: "operational_security_determines_remediation_urgency"
  
  priority_hierarchy:
    priority_1_immediate_credential_revocation: "absolute_and_unconditional"
    priority_2_containment_of_exploitation: "cannot_be_delayed"
    priority_3_forensic_investigation: "cannot_be_compromised"
    priority_4_system_restoration: "cannot_be_incomplete"
    priority_5_operational_continuity: "managed_within_security_constraints"

uncertainty_governance:
  uncertainty_identification:
    mechanism: "explicit_exposure_and_compromise_uncertainty_detection"
    uncertainty_types:
      type_1_exposure_signal_legitimacy_unverifiable: "escalate_to_security_analyst"
      type_2_credential_actual_exposure_ambiguous: "investigate_comprehensively"
      type_3_exploitation_likelihood_uncertain: "assume_worst_case_escalate"
      type_4_affected_scope_partially_identifiable: "assume_maximum_scope_escalate"
      type_5_investigation_unable_to_determine_exploitation: "maintain_defensive_posture"
  
  visibility_requirements:
    mechanism: "mandatory_exposure_and_investigation_uncertainty_articulation"
    mandatory_output:
      - exposure_signal_credibility_assessment
      - credential_exposure_scope_determination
      - exploitation_probability_assessment_basis
      - compromise_investigation_confidence_level
      - residual_uncertainty_and_limiting_factors
      - recommended_additional_investigation_or_monitoring
  
  escalation:
    mechanism: "graduated_uncertainty_response"
    level_1_minor_uncertainty_routine_exposure: "heightened_monitoring_standard_rotation"
    level_2_moderate_uncertainty_scope_unclear: "expanded_investigation_escalated_response"
    level_3_significant_uncertainty_likely_exploited: "emergency_response_maximum_containment"
    level_4_critical_uncertainty_extensive_compromise: "executive_escalation_legal_involvement"

trust_boundaries:
  exposure_signal_trust_hierarchy:
    internal_automated_detection: highest_trust_trigger_immediate_response
    trusted_security_vendor_notification: high_trust_escalate_within_24_hours
    law_enforcement_notification: high_trust_prioritized_response
    threat_intelligence_report: medium_trust_verify_and_escalate
    external_report_unverified_source: low_trust_validate_before_action
  
  exploitation_evidence_trust_boundary:
    forensic_log_evidence: authoritative_for_exploitation_determination
    access_pattern_anomalies: indicative_suspicious_pattern_not_definitive
    attacker_attribution_claims: indicative_not_definitive_without_evidence
    threat_intelligence_speculation: supplementary_not_basis_for_action

runtime_behavior:
  exposure_detection_monitoring: continuous_across_detection_vectors
  signal_credibility_assessment: immediate_upon_signal_reception
  containment_action_execution: triggered_on_signal_credibility_verification
  investigation_and_forensics: activated_immediately_post_containment
  remediation_workflow_execution: initiated_based_on_investigation_findings
  recovery_and_learning_initiation: scheduled_upon_incident_stabilization

runtime_degradation:
  on_exposure_signal_credible_but_scope_unclear:
    response_mode: expanded_investigation_elevated_response
    containment_posture: conservative_assume_worst_case
    escalation_requirement: management_notification

  on_exploitation_evidence_discovered:
    response_mode: escalated_to_critical_incident
    containment_posture: maximum_defensive_response
    escalation_requirement: immediate_executive_and_security_leadership

  on_investigation_unable_to_definitively_determine_exploitation:
    response_mode: defensive_posture_maintained
    monitoring_level: enhanced_indefinitely
    escalation_requirement: periodic_reassessment_and_decision_point

confidence_governance:
  binary_exposure_assumption: prohibited
  implicit_non_exploitation_assumption: prohibited
  exposure_credibility_confidence: verified_assessment_required
  exploitation_probability_confidence: evidence_based_estimation
  hallucinated_no_compromise_assumption_prevention: enforced
  uncertainty_exposure: mandatory_before_operational_decisions

traceability:
  exposure_detection_event_lineage: preserved_with_detection_vector
  signal_assessment_history: immutable_audit_log
  containment_action_timing_and_scope: recorded_per_event
  investigation_findings_and_evidence: permanently_documented
  remediation_activities_and_verification: fully_traceable
  incident_response_coordination_log: maintained_throughout_lifecycle

human_oversight:
  exposure_response_authority: security_operations_center_and_management
  escalation_authority: chief_information_security_officer_and_executive_level
  investigation_authority: forensics_and_security_investigation_specialists
  escalation_triggers:
    - credential_exposure_confirmed_with_sensitive_scope
    - exploitation_evidence_discovered
    - wide_scope_exposure_affecting_critical_systems
    - repeated_similar_exposures_indicating_pattern
    - attacker_attribution_or_targeted_campaign_indication
  autonomous_response_authority_limitations: revocation_contained_investigation_escalated

bounded_cognition:
  recursive_exposure_scope_expansion: prohibited
  self_modifying_detection_policy: prohibited
  cross_incident_detection_contamination: prohibited
  adaptive_response_aggressiveness_without_oversight: prohibited
  deterministic_response_behavior: enforced
  operational_incident_response_boundary_preservation: strict

implementation_leakage_control:
  vulnerability_scanner_tool_implementation: excluded
  dark_web_monitoring_infrastructure: excluded
  breach_database_integration_details: excluded
  threat_intelligence_feed_integration: excluded
  detection_system_deployment_procedures: excluded
  forensics_tool_configuration: excluded

meta_governance:
  preserve_credential_exposure_governance_boundary_integrity: true
  prohibit_runtime_response_policy_drift: true
  preserve_deterministic_response_behavior: true
  maintain_escalation_protocol_integrity_throughout_incident: true

output_standard:
  expose_exposure_signal_credibility_assessment: required
  expose_credential_exposure_scope_determination: required
  expose_exploitation_probability_assessment: required
  expose_affected_systems_and_resources_identified: required
  expose_investigation_confidence_and_findings: required
  expose_remediation_status_and_verification: required
  expose_response_uncertainty_and_limiting_factors: required
  separate_exposure_detection_from_exploitation_confirmation: enforced
  auditability: full
  explainability: required_at_each_exposure_response_decision_point
