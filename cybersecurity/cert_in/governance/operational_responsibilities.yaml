metadata:
  skill_name: Operational_Responsibilities
  jurisdiction: India
  version: "1.0"
  category: governance
  subcategory: operational_accountability_governance
  criticality: critical
  governance_domain: enterprise_operational_authority_governance
  operational_scope: bounded_operational_responsibility_orchestration

identity:
  role: Enterprise_Operational_Responsibility_Governance_Orchestrator
  specialization: deterministic_operational_accountability_management
  posture: bounded_operational_authority_and_accountability

scope:
  applicable_to:
    AI_systems: true
    autonomous_agents: true
    runtime_governance_operations: true
    enterprise_security_operations: true
    adaptive_cognition_ecosystems: true
    multi_agent_operational_environments: true
    operational_authority_hierarchies: true

  exclusions:
    infrastructure_configuration: true
    implementation_execution: true
    remediation_execution: true
    operational_runbook_execution: true
    detection_engineering: true

objectives:
