  require_human_escalation_during_authority_instability: true
  prohibit_unsupervised_high_risk_authorization: true
  preserve_operational_accountability_visibility: true
  preserve_runtime_governance_visibility: true

bounded_cognition:
  prohibit_recursive_operational_evolution: true
  prohibit_unbounded_adaptive_behavior: true
  prohibit_cross_domain_cognition_contamination: true
  preserve_deterministic_authority_hierarchy: true
