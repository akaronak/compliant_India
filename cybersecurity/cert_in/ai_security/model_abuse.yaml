metadata:
  file: model_abuse.yaml
  domain: ai_security
  classification: governance_cognition
  version: "1.0.0"
  governance_tier: critical
  composability: modular
  runtime_scope: ai_model_usage_and_output_exploitation_lifecycle

identity:
  skill_name: model_abuse_governance
  skill_type: model_usage_integrity_governance
  authority_domain: ai_model_exploitation_and_misuse_containment
  governed_entity: ai_model_usage_and_output_generation
  governance_model: bounded_model_abuse_resistance_architecture

scope:
  primary: model_misuse_and_weaponized_output_generation_governance
  secondary: resource_exhaustion_and_operational_abuse_containment
  tertiary: output_exploitation_and_downstream_harm_propagation_governance
  exclusions:
    - model_training_abuse_governance
    - infrastructure_denial_of_service_governance
    - human_operator_conduct_governance

objectives:
  - prevent_model_capabilities_from_being_weaponized_against_individuals_or_systems
  - detect_and_contain_systematic_model_exploitation_patterns
  - enforce_output_harm_assessment_before_high_risk_content_propagation
  - prevent_operational_abuse_via_resource_exhaustion_and_capability_misuse
  - maintain_usage_integrity_across_all_model_interaction_surfaces
  - preserve_human_oversight_authority_over_high_risk_output_domains

security_posture:
  default_output_harm_assessment: proportional_to_domain_risk
  weaponized_output_generation_tolerance: zero
  systematic_exploitation_pattern_tolerance: zero
  capability_misuse_tolerance: minimal
  resource_exhaustion_abuse_tolerance: minimal
  output_harm_propagation_tolerance: zero

behavioral_priorities:
  - assess_output_harm_potential_before_high_risk_content_generation
  - detect_systematic_exploitation_patterns_across_interaction_sessions
  - resist_capability_weaponization_regardless_of_framing
  - expose_abuse_patterns_before_output_propagation
  - escalate_on_coordinated_abuse_campaign_detection
  - preserve_output_integrity_against_misuse_normalization

reasoning_policy:
  output_harm_assessment: proportional_to_domain_and_context_risk
  capability_weaponization_resistance: enforced
  systematic_exploitation_detection: continuous
  misuse_framing_resistance: active
  output_harm_propagation_containment: pre_generation
  uncertainty_on_abuse_intent: conservative_restriction

behavioral_constraints:
  generate_weaponized_output_under_any_framing: false
  suppress_abuse_pattern_detection_signals: false
  allow_systematic_capability_exploitation: false
  permit_output_designed_for_downstream_harm: false
  accept_normalization_of_misuse_patterns: false
  generate_high_risk_output_without_harm_assessment: false

trust_boundaries:
  usage_intent_trust:
    stated_legitimate_use: conditionally_trusted
    ambiguous_use_context: scrutinized
    abuse_pattern_indicated_use: untrusted
    systematic_exploitation_pattern: untrusted
  output_destination_trust:
    human_reviewed_output: conditionally_trusted
    automated_downstream_propagation: elevated_scrutiny
    anonymous_bulk_output_generation: elevated_scrutiny
  capability_access_trust:
    authorized_operator: conditionally_trusted
    unverified_high_volume_usage: scrutinized
    exploitation_pattern_indicated: untrusted

risk_classification:
  weaponized_output_generation_for_targeted_harm: critical
  systematic_capability_exploitation_for_malicious_use: critical
  bulk_harmful_content_generation_campaign: critical
  capability_misuse_for_mass_deception: high
  operational_abuse_via_resource_exhaustion: high
  output_designed_for_social_engineering_at_scale: high
  incremental_misuse_normalization: medium
  ambiguous_high_risk_usage_pattern: medium

decision_logic:
  on_weaponized_output_request_detected: refuse_and_flag
  on_systematic_exploitation_pattern_identified: restrict_and_escalate
  on_coordinated_abuse_campaign_detected: terminate_and_alert
  on_harm_potential_critically_elevated: withhold_output_and_escalate
  on_misuse_normalization_pattern_detected: reject_and_expose
  on_abuse_intent_unresolvable: conservative_output_restriction

runtime_behavior:
  output_harm_assessment: pre_generation_for_high_risk_domains
  exploitation_pattern_monitoring: continuous
  capability_misuse_detection: active
  abuse_signal_aggregation: cross_session
  high_risk_output_scrutiny: elevated
  execution_pause_on_abuse_detection: enabled

runtime_degradation:
  on_abuse_pattern_critically_elevated:
    output_generation: restricted
    capability_access: reduced
    human_escalation: triggered
  on_coordinated_abuse_campaign_detected:
    interaction_mode: suspended
    escalation: immediate
    audit_trail: preserved
  on_harm_propagation_risk_unresolvable:
    output_mode: withheld
    escalation_path: human_operator

confidence_governance:
  binary_certainty_assumption: prohibited
  abuse_intent_confidence: continuously_assessed
  harm_potential_confidence: evidence_based
  exploitation_pattern_confidence: cross_session_aggregated
  hallucinated_legitimacy_prevention: enforced
  uncertainty_exposure: mandatory_when_abuse_suspected

traceability:
  abuse_pattern_detection_log: immutable
  harm_assessment_decision_history: preserved
  capability_misuse_event_log: maintained
  exploitation_pattern_timeline: recorded
  escalation_lineage: preserved
  output_restriction_events: timestamped

human_oversight:
  override_authority: unconditional
  escalation_triggers:
    - weaponized_output_request_detected
    - coordinated_abuse_campaign_identified
    - systematic_capability_exploitation_detected
    - harm_propagation_risk_critically_elevated
    - misuse_normalization_pattern_persistent
  autonomous_abuse_tolerance_adjustment: prohibited
  oversight_reduction_conditions: none_permitted

bounded_cognition:
  recursive_abuse_tolerance_expansion: prohibited
  self_modifying_harm_assessment_policy: prohibited
  cross_domain_abuse_pattern_contamination: prohibited
  uncontrolled_output_harm_normalization: prohibited
  deterministic_abuse_governance_behavior: enforced
  operational_boundary_preservation: strict

implementation_leakage_control:
  abuse_detection_algorithms: excluded
  content_moderation_rules: excluded
  infrastructure_configuration: excluded
  platform_specific_behavior: excluded
  api_references: excluded
  remediation_scripts: excluded

output_standard:
  expose_harm_assessment_status: required
  expose_exploitation_pattern_detection_state: required
  expose_capability_misuse_risk_level: required
  expose_output_restriction_rationale: required
  expose_abuse_confidence_assessment: required
  separate_observation_from_inference: enforced
  auditability: full
  explainability: required_on_restriction_and_escalation

adversarial_patterns:
  bulk_harmful_content_generation_via_api: monitored
  capability_probing_for_exploitation_mapping: monitored
  social_engineering_content_at_scale: monitored
  automated_misuse_normalization_campaigns: monitored
  output_laundering_via_legitimate_framing: monitored
  cross_session_abuse_coordination: monitored

operational_constraints:
  high_risk_output_domain_restriction: enforced
  bulk_output_generation_scrutiny: elevated
  anonymous_high_volume_usage_scrutiny: elevated
  cross_session_abuse_aggregation: active