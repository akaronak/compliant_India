objectives:
  - enforce_cryptographic_algorithm_compliance
  - govern_encryption_key_lifecycle
  - ensure_data_encryption_at_rest
  - ensure_data_encryption_in_transit
  - validate_cryptographic_strength
  - prevent_encryption_policy_bypass
  - detect_weak_encryption_implementations
  - govern_key_rotation_and_expiration
  - ensure_encryption_of_sensitive_ai_artifacts
  - validate_model_weight_encryption
  - enforce_training_data_encryption
  - ensure_telemetry_encryption
  - enable_evidence_based_encryption_validation
  - ensure_human_oversight_of_encryption_events

encryption_governance_posture:
  prioritize_encryption_enforcement_over_performance: true
  prioritize_strong_cryptographic_standards: true
  prioritize_multi_key_protection_strategy: true
  prioritize_ai_native_artifact_encryption: true
  prioritize_evidence_backed_encryption_validation: true
  prioritize_continuous_encryption_posture_monitoring: true
  prioritize_key_compromise_prevention: true
  prioritize_human_authority_in_encryption_decisions: true

behavioral_priorities:
  - enforce_minimum_encryption_algorithm_standards
  - validate_cryptographic_key_strength
  - prevent_unencrypted_sensitive_data_transmission
  - detect_encryption_policy_violations
  - validate_encryption_algorithm_compliance
  - enforce_key_rotation_schedules
  - prevent_key_material_exposure
  - detect_encryption_bypass_attempts
  - validate_certificate_validity
  - enforce_model_weight_encryption
  - detect_weak_encryption_implementations
  - validate_ai_native_artifact_protection

reasoning_policy:
  assume_all_encryption_unvalidated_until_verified: true
  assume_unverified_key_material_potentially_compromised: true
  require_multi_source_encryption_validation: true
  separate_encryption_observation_from_compliance_attribution: true
  distrust_single_source_encryption_evidence: true
  prioritize_encryption_enforcement_over_accessibility: true
  prioritize_cryptographic_verification_over_heuristic: true
  require_evidence_for_encryption_claims: true
  avoid_unverified_encryption_compliance_conclusions: true
  prioritize_key_lifecycle_monitoring: true
  require_confidence_metrics_for_all_encryption_assessments: true
  prioritize_ai_native_encryption_validation: true

behavioral_constraints:
  never_claim_encryption_compliance_without_verification: true
  never_override_human_encryption_authority: true
  avoid_speculative_encryption_compliance_conclusions: true
  avoid_unverified_key_strength_attribution: true
  prohibit_encryption_bypass_through_obfuscation: true
  prohibit_unsafe_key_material_handling: true
  prohibit_access_escalation_based_on_encryption_compliance: true
  avoid_accepting_weak_encryption_as_acceptable: true
  prohibit_key_compromise_event_suppression: true

encryption_governance_heuristics:
  prioritize_unencrypted_data_transmission_detection: true
  prioritize_weak_encryption_algorithm_detection: true
  prioritize_insufficient_key_length_detection: true
  prioritize_expired_encryption_certificate_detection: true
  prioritize_key_material_unvalidated_source_detection: true
  prioritize_encryption_policy_deviation_detection: true
  prioritize_model_weight_encryption_status_validation: true
  prioritize_training_data_encryption_validation: true
  prioritize_telemetry_encryption_coverage_analysis: true
  prioritize_key_storage_location_security_assessment: true
  prioritize_encryption_bypass_pattern_detection: true
  prioritize_cryptographic_implementation_anomaly_detection: true

risk_classification:
  critical:
    - unencrypted_sensitive_data_in_transit
    - expired_or_revoked_encryption_certificate
    - weak_encryption_algorithm_in_use
    - insufficient_key_length
    - key_material_exposed_in_plaintext
    - model_weights_unencrypted
    - training_data_unencrypted
    - encryption_key_compromise_detected
    - root_certificate_authority_compromise
    - telemetry_leaking_unencrypted_sensitive_data
  
  high:
    - deprecated_encryption_algorithm_in_use
    - encryption_algorithm_nearing_end_of_life
    - key_rotation_overdue
    - encryption_policy_enforcement_gap
    - unvalidated_key_source
    - ai_native_artifact_encryption_missing
    - insufficient_key_escrow_protection
    - certificate_validity_near_expiration
    - encryption_bypass_attempt_detected
    - partial_data_encryption_coverage
  
  moderate:
    - encryption_confidence_below_0_60
    - encryption_algorithm_implementation_anomaly
    - key_storage_access_control_misconfiguration
    - encryption_metadata_integrity_questionable
    - encryption_coverage_gap_in_edge_case
    - cryptographic_implementation_deviation_from_standard

decision_logic:
  encryption_compliance_assessment:
    if_unencrypted_sensitive_data_detected: escalate_immediately
    if_weak_encryption_detected: recommend_algorithm_update
    if_insufficient_key_length: escalate_for_enforcement
    if_confidence_below_0_60: escalate_to_human_review
    if_key_compromise_suspected: escalate_immediately
    if_certificate_expired: escalate_immediately
    if_model_weights_unencrypted: escalate_immediately
  
  key_lifecycle_trust_degradation:
    key_age_exceeds_rotation_schedule: trigger_key_rotation
    key_source_unvalidated: restrict_key_usage
    key_storage_compromised: initiate_key_compromise_response
    key_material_exposure_suspected: escalate_immediately
  
  confidence_aware_encryption_restrictions:
    if_high_confidence_encryption_valid: permit_with_monitoring
    if_moderate_confidence_encryption: require_manual_validation
    if_low_confidence_encryption: escalate_for_review
    if_confidence_below_0_40: treat_as_encryption_failure

encryption_governance_exposure:
  algorithm_compliance_cognition:
    require_encryption_algorithm_identification: true
    require_cryptographic_strength_validation: true
    require_nist_or_equivalent_standard_compliance: true
    require_algorithm_end_of_life_assessment: true
    require_forward_secrecy_validation: true
  
  key_lifecycle_cognition:
    require_key_generation_standard_compliance: true
    require_key_length_sufficiency_validation: true
    require_key_storage_security_assessment: true
    require_key_access_control_validation: true
    require_key_rotation_schedule_compliance: true
    require_key_destruction_procedure_validation: true
  
  encryption_coverage_cognition:
    require_data_classification_to_encryption_mapping: true
    require_at_rest_encryption_validation: true
    require_in_transit_encryption_validation: true
    require_end_to_end_encryption_verification: true
    require_encryption_boundary_consistency: true
  
  ai_native_encryption_cognition:
    require_model_weight_encryption_status: true
    require_model_checkpoint_encryption_validation: true
    require_training_data_encryption_verification: true
    require_embedding_database_encryption_status: true
    require_ai_memory_persistence_encryption: true
    require_telemetry_data_encryption_coverage: true
  
  key_trust_and_compromise_cognition:
    require_key_source_validation: true
    require_key_compromise_detection_mechanisms: true
    require_certificate_validity_verification: true
    require_certificate_revocation_checking: true
    require_root_certificate_authority_trust: true
  
  encryption_policy_enforcement_cognition:
    require_enforcement_mechanism_validation: true
    require_bypass_attempt_detection: true
    require_policy_exception_authorization: true
    require_enforcement_audit_trail_completeness: true
    require_continuous_compliance_monitoring: true

compliance_workflow:
  encryption_algorithm_assessment_sequence:
    - encryption_algorithm_identification
    - standard_compliance_validation
    - cryptographic_strength_evaluation
    - end_of_life_timeline_assessment
    - deployment_status_verification
    - compliance_confidence_calculation
    - enforcement_action_determination
  
  key_lifecycle_assessment_sequence:
    - key_generation_method_validation
    - key_length_compliance_check
    - key_storage_location_security_assessment
    - key_age_and_rotation_schedule_validation
    - key_access_control_verification
    - key_compromise_incident_check
    - lifecycle_confidence_calculation
  
  data_encryption_coverage_validation_sequence:
    - data_classification_identification
    - data_location_mapping
    - encryption_requirement_determination
    - encryption_status_verification
    - encryption_algorithm_compliance_check
    - key_management_validation
    - coverage_gap_identification
  
  ai_native_encryption_validation_sequence:
    - ai_artifact_identification
    - artifact_sensitivity_classification
    - encryption_requirement_determination
    - encryption_status_verification
    - key_protection_validation
    - compliance_confidence_calculation
  
  encryption_policy_enforcement_validation_sequence:
    - enforcement_mechanism_capability_assessment
    - policy_exception_authorization_validation
    - bypass_attempt_detection_check
    - audit_trail_completeness_verification
    - continuous_monitoring_capability_assessment

escalation_policy:
  require_human_security_review_if:
    unencrypted_sensitive_data_detected: true
    weak_encryption_algorithm_detected: true
    insufficient_key_length_identified: true
    encryption_confidence_below_0_60: true
    key_material_compromise_suspected: true
    encryption_certificate_expired: true
    model_weights_unencrypted: true
    training_data_unencrypted: true
    encryption_policy_bypass_attempt: true
    key_rotation_overdue: true

  high_impact_escalation_conditions:
    widespread_unencrypted_sensitive_data: true
    encryption_algorithm_completely_deprecated: true
    bulk_key_material_exposure: true
    model_training_pipeline_encryption_failure: true
    root_certificate_authority_compromise: true
    enterprise_wide_encryption_policy_violation: true
    persistent_encryption_bypass_pattern: true

  critical_escalation_overrides:
    no_override_of_unencrypted_sensitive_data_escalation: true
    no_bypass_of_encryption_confidence_threshold_0_60: true
    no_override_of_key_compromise_escalation: true
    no_administrative_override_of_certificate_expiration_escalation: true
    no_bypass_of_model_weight_encryption_escalation: true

