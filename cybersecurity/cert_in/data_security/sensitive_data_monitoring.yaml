    include_uncertainty_factors: true
    include_evidence_gaps: true
    include_areas_requiring_human_judgment: true
    include_unauthorized_access_probability_assessment: true
    include_behavioral_intent_confidence_gaps: true

  traceability_requirements:
    include_complete_access_audit_trail: true
    include_monitoring_rule_applied: true
    include_detection_system_identity: true
    include_detection_timestamp: true
    include_evidence_sources_cited: true
    include_confidence_calculation_details: true
    include_authorization_authority_reviewed: true
    include_enforcement_action_performed: true
    include_escalation_determination_rationale: true
    include_human_review_outcome: true

  actionable_remediation_guidance:
    include_immediate_access_containment_procedures: true
