    include_confidence_tier_classification: true
    include_severity_level_determination: true
    include_confidence_degradation_factors: true
    include_uncertainty_indicators: true

  exposure_risk_analysis:
    include_potential_data_exposure_scope: true
    include_sensitive_data_categories_at_risk: true
    include_potential_reidentification_risk: true
    include_cross_system_exposure_implications: true
    include_ai_system_exposure_risk: true
    include_training_pipeline_risk: true

  operational_impact_analysis:
    include_data_value_to_organization: true
    include_regulatory_compliance_risk: true
    include_user_trust_impact: true
    include_operational_continuity_impact: true
