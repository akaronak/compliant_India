    include_authorization_recency: true
    include_authorization_confidence_score: true
    include_policy_compliance_status: true

  behavioral_analysis_visibility:
    include_baseline_vs_current_behavior_comparison: true
    include_deviation_indicators: true
    include_contextual_intent_assessment: true
    include_behavioral_confidence_score: true
    include_anomaly_severity_classification: true
    include_cross_system_correlation_evidence: true
    include_historical_pattern_analysis: true

  ai_native_monitoring_visibility:
    include_model_inference_data_access_status: true
    include_training_data_access_authorization_status: true
    include_model_output_sensitive_content_detection_results: true
    include_embedding_database_access_authorization: true
    include_autonomous_agent_scope_validation_status: true
    include_memory_system_access_classification: true

  confidence_and_severity_visibility:
