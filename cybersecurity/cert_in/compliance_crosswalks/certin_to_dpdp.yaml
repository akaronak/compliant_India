  incident_records: true
  breach_notifications: true
  consent_validation_records: true
  processing_activity_logs: true
  audit_trails: true

risk_considerations:

  critical:
    personal_data_breach: true
    unauthorized_sensitive_data_access: true
    unreported_security_incidents: true

  high:
    weak_access_controls: true
    incomplete_audit_logging: true
    insufficient_monitoring_visibility: true