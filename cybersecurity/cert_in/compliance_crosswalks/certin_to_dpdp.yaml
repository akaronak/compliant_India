metadata:
  schema_version: "1.0"
  crosswalk_name: CERT_IN_to_DPDP_Alignment
  primary_framework: CERT_IN
  secondary_framework: DPDP_Act_2023
  category: cybersecurity_and_privacy_alignment
  criticality: high
  interoperability_domain: privacy_security_governance
  operational_scope: enterprise_runtime_governance

crosswalk_posture:
