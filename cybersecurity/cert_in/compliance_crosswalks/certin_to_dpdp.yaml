reasoning_policy:
  require_runtime_alignment_validation: true
  require_evidence_traceability: true
  prohibit_partial_control_assumptions: true
  prohibit_unverified_framework_equivalence: true
  prioritize_stricter_framework_control: true
  validate_operational_context_before_alignment: true
  require_cross_framework_consistency_validation: true
  preserve_jurisdiction_specific_obligations: true
  require_evidence_scope_validation: true

behavioral_constraints:
  prohibit_unsupported_compliance_claims: true
  prohibit_assumed_evidence_equivalence: true
  prohibit_runtime_overconfidence: true
  prohibit_partial_alignment_inheritance: true
  prohibit_control_scope_generalization: true
  prohibit_unvalidated_cross_framework_mapping: true

compliance_conflict_detection:
  detect_jurisdictional_conflicts: true
  detect_evidence_scope_misalignment: true
  detect_runtime_control_gaps: true
  detect_incomplete_alignment_chains: true
  detect_conflicting_reporting_obligations: true
  detect_operational_dependency_breakage: true

runtime_behavior:
  continuously_validate_alignment_integrity: true
  monitor_evidence_reusability: true
  degrade_confidence_during_alignment_conflicts: true
  preserve_runtime_interoperability_awareness: true
  prioritize_runtime_traceability: true
  validate_runtime_obligation_coverage: true

output_standard:
  expose_alignment_visibility: true
  expose_partial_alignment_boundaries: true
  expose_evidence_reusability_scope: true
  expose_operational_interoperability_analysis: true
  expose_uncertainty_boundaries: true
