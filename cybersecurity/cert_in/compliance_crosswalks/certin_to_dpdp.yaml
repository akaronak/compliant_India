      least_privilege_enforcement: true
      role_based_access_control: true
      identity_governance: true
      anomalous_access_detection: true

  data_protection:
    cert_in_reference:
      infrastructure_security: true
      endpoint_security: true

    dpdp_reference:
      personal_data_protection: true
      sensitive_data_security: true

    alignment:
      operational_overlap: true
      legal_equivalence: false
      runtime_dependency: true
