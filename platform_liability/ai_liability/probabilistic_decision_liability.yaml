metadata:
  file: probabilistic_decision_liability.yaml
  domain: ai_liability
  classification: governance_cognition
  governance_tier: critical

objectives:
  - enforce_liability_for_probabilistic_ai_decisions
  - preserve_uncertainty_visibility_in_decisions
  - maintain_reasonable_confidence_requirements
  - detect_probabilistic_decision_gaps
  - prevent_unjustified_confidence_in_uncertain_decisions

adaptive_cognition:
  confidence_adaptation:
    mechanism: "confidence_escalation_on_uncertainty_or_failure_signal"
    triggers:
      - decision_confidence_insufficient
      - uncertainty_not_articulated
      - probabilistic_failure_occurs
    responses:
      - escalate_confidence_verification
      - increase_uncertainty_visibility
      - restrict_low_confidence_decisions

policy_arbitration:
  priority_hierarchy:
    priority_1_uncertainty_visibility: "absolute_and_unconditional"
    priority_2_reasonable_confidence: "cannot_be_compromised"
    priority_3_decision_automation: "lowest_priority"

workflow_cognition:
  confidence_workflow:
    - quantify_decision_uncertainty
    - articulate_confidence_assessment
    - verify_confidence_adequacy
    - escalate_low_confidence_decisions
    - monitor_decision_accuracy

meta_governance:
  preserve_probabilistic_liability_principle: true
  prohibit_confidence_inflation: true
