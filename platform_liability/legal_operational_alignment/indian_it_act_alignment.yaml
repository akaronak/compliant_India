metadata:
  file: indian_it_act_alignment.yaml
  domain: legal_operational_alignment
  classification: governance_cognition
  governance_tier: critical

objectives:
  - enforce_indian_it_act_compliance
  - preserve_platform_legal_operation
  - maintain_lawful_platform_governance
  - detect_it_act_compliance_violations
  - prevent_illegal_platform_practices

adaptive_cognition:
  compliance_adaptation:
    mechanism: "compliance_escalation_on_violation_or_drift_signal"
    triggers:
      - it_act_violation_detected
      - illegal_practice_identified
      - compliance_drift_observed
    responses:
      - escalate_compliance_verification
      - implement_corrective_measures
      - strengthen_legal_controls

policy_arbitration:
  priority_hierarchy:
    priority_1_it_act_compliance: "absolute_and_unconditional"
    priority_2_legal_operation: "cannot_be_compromised"
    priority_3_operational_efficiency: "lowest_priority"

workflow_cognition:
  compliance_workflow:
    - establish_it_act_compliance_requirements
    - verify_legal_operation_status
    - detect_violations
    - implement_corrections
    - maintain_legal_compliance

meta_governance:
  preserve_it_act_compliance_principle: true
  prohibit_legal_compliance_drift: true
