metadata:
  file: crisis_response_governance.yaml
  domain: platform_risk_management
  classification: governance_cognition
  governance_tier: critical

objectives:
  - enforce_crisis_response_activation_and_execution
  - preserve_operational_continuity_during_crisis
  - maintain_rapid_response_and_recovery_capability
  - detect_crisis_response_gaps_or_failures
  - prevent_crisis_escalation_or_prolonged_dysfunction

adaptive_cognition:
  crisis_adaptation:
    mechanism: "response_escalation_on_crisis_detection_or_failure_signal"
    triggers:
      - crisis_event_detected
      - response_inadequate
      - recovery_not_progressing
    responses:
      - activate_emergency_protocols
      - escalate_response_intensity
      - mobilize_all_available_resources

policy_arbitration:
  priority_hierarchy:
    priority_1_crisis_response_activation: "absolute_and_unconditional"
    priority_2_harm_mitigation: "cannot_be_compromised"
    priority_3_normal_operations_resumption: "lowest_priority"

workflow_cognition:
  crisis_workflow:
    - detect_crisis_trigger_events
    - assess_crisis_severity_and_scope
    - activate_response_protocols
    - implement_mitigation_measures
    - support_recovery_process

meta_governance:
  preserve_crisis_response_capability_principle: true
  prohibit_response_degradation: true
