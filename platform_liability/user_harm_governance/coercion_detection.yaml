metadata:
  file: coercion_detection.yaml
  domain: user_harm_governance
  classification: governance_cognition
  governance_tier: critical

objectives:
  - enforce_platform_coercion_detection
  - preserve_user_autonomy_and_freedom
  - maintain_rapid_coercion_detection_and_intervention
  - detect_coercion_detection_gaps
  - prevent_unaddressed_user_coercion

adaptive_cognition:
  detection_adaptation:
    mechanism: "detection_escalation_on_coercion_or_gap_signal"
    triggers:
      - coercive_behavior_detected
      - detection_gap_identified
      - intervention_delayed
    responses:
      - escalate_detection_sensitivity
      - accelerate_intervention
      - enhance_protection_measures

policy_arbitration:
  priority_hierarchy:
    priority_1_coercion_prevention: "absolute_and_unconditional"
    priority_2_user_autonomy_protection: "cannot_be_compromised"
    priority_3_operational_efficiency: "lowest_priority"

workflow_cognition:
  detection_workflow:
    - identify_coercive_patterns_and_pressure
    - assess_coercion_severity
    - determine_user_protection_needs
    - implement_protective_interventions
    - support_user_autonomy_restoration

meta_governance:
  preserve_coercion_detection_principle: true
  prohibit_detection_capability_degradation: true
